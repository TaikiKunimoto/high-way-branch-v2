# pre-commit フック設定
#   初回セットアップ : uv run pre-commit install
#   手動で全ファイル実行: uv run pre-commit run --all-files
#
# ruff / mypy はプロジェクトの uv 管理バージョン（pyproject の dev 依存）を
# そのまま使うため local フックにしている。pre-commit が別途用意する版との
# ズレや、mypy の依存解決が崩れるのを避けるため。
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
